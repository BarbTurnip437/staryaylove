渚浔笑辞立刻拍手：“太好了！今晚我请大家喝奶茶！”
小鸟游刘网把电脑屏幕转向你：“我把档案库权限开给你，以后我们一起挖线索！”"

加比镜岚轻轻点了点头，眼神里多了一丝温度。
棱斯新耀羽走到你身边，拍了拍你的肩膀：“我们一起，把这个谜团解开。”

接下来的几天，你渐渐熟悉了社团的节奏。
每天放学后，大家都会聚在活动室里，有人整理资料，有人分析旧闻，有人默默写着代码。"

渚浔笑辞总会准时带来各种小点心，活动室里永远飘着甜甜的香味。
加比镜岚依旧话不多，但总会在你需要的时候，安静地递上东西或者提醒细节。
棱斯新耀羽不管什么时候出现，都像小太阳一样，把气氛变得轻松又明亮。
千日坂芷芽则会一边画画，一边给你讲社团过去的小故事。
小鸟游刘网一有空就敲代码，说是要把所有旧资料都做成可检索的数据库。

很快到了周五，放学的时候，渚浔笑辞突然蹦到大家面前。
渚浔笑辞：“周末我们去近郊团建吧！我查好天气了，晴天，超级适合看星星！”
小鸟游刘网：“我带电脑去，晚上可以给大家放电影！”
加比镜岚：“我准备急救包和用品。”
棱斯新耀羽笑着看向你：“你要一起来吧？缺了你可就不热闹了。”
千日坂芷芽也轻轻点头：“一起去吧，就当是欢迎新人的纪念。”

周末的团建顺利又开心，大家一起搭帐篷、烤肉、看星星，聊了很多很多话。
你和每个人的距离，都在不知不觉中拉近了不少。
【第一章 结束】

【第二章 开始】
团建之后，日子平稳地向前走，转眼就到了校运会。
操场上人声鼎沸，彩旗被风吹得轻轻晃动。

渚浔笑辞抱着一大堆零食和饮料，在看台上到处分发。
加比镜岚参加了跑步项目，正在跑道边认真热身。
棱斯新耀羽作为学生代表，在主席台上主持，声音清晰又好听。
千日坂芷芽坐在你旁边，拿着画本，把眼前的画面一点点画下来。
小鸟游刘网则抱着电脑，实时刷新比赛数据，时不时兴奋地小声喊两句。

接力赛的时候，加比镜岚最后一棒冲刺，你和刘网在旁边拼命加油。
冲线的那一刻，刘网激动地敲了下键盘：“预测成功！完美发挥！”
加比镜岚喘着气走过来，第一次对你露出了很淡很淡的笑。

傍晚，夕阳把整个操场染成了暖橙色。
大家坐在看台上，吃着笑辞带的甜点，聊着今天发生的趣事。
你看着身边这群人，心里第一次清楚地感觉到，自己真的有了可以安心待着的地方。"

