【选择题：你想怎么做？】
1. 愤怒的说到：“这些用户是人类吗？芷芽酱辛辛苦苦搞的作品，却被你们这群身上长满蛔虫的狗造谣说成ai！！！”
2. 摸着她的脸安慰到：“没事的，每个人把自己的作品发布都会被质疑和辱骂，这是正常的”
> """
require_input = true
set_ran_action = false


[[actions]]
requirement = { input_pattern = '^1' }
text = """
芷芽对此愤愤不平

从那天起，芷芽慢慢的不喜欢说话了
