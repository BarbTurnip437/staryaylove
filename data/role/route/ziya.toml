# 千日坂芷芽（绘画少女）·长篇个人线 + 选择题
text = """

==================================================
                 千日坂芷芽 个人线
==================================================
按回车开始……
"""


[[actions]]
text = """

你越来越常注意到窗边画画的戴着耳机的少女。
她安静、温柔、话少，却总能用画笔表达一切。
你开始主动留在教室，陪她一起画画。

【选择题：你想怎么夸她的画？】
1. 你的画好温柔，像你一样
