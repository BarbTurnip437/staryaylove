[actions.flag_operations]
likeability."千日坂芷芽" = ["add", "$likeability.千日坂芷芽", 10]


[[actions]]
text = """

有一次，你发现芷芽在那非常生气
你靠近问：“怎么了？”
芷芽拿着平板给你看
原来芷芽因为发布的作品质量太高了
被别人质疑是AI生成的
还有一些人造假，说芷芽的画作使用了200+个AI模型
