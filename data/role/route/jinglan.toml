# 加比镜岚 个人线
text = """

==================================================
                  加比镜岚 个人线
==================================================
按回车开始……
"""

[[actions]]
text = """
镜岚外表冷淡，内心却比谁都温柔。
你一点点走进她的心，打破她的孤独。

【选择题：你想如何靠近她？】
1. 耐心陪伴
2. 主动搭话
> """
require_input = true
set_ran_action = false


[[actions]]
requirement = { input_pattern = '^1' }
text = """
你选择了耐心陪伴，静静地待在她身边。
渐渐地，她开始习惯你的存在，偶尔会和你分享一些想法。
时间久了，她冰冷的外壳慢慢融化，向你敞开心扉，说出藏在心底的告白。
==================================================
           加比镜岚 · TRUE END 镜心之光
==================================================
"""


[[actions]]
requirement = { capture = true }
text = """
你主动搭话，起初她有些抗拒，但你坚持不懈。
慢慢地，她开始回应你的问候，偶尔也会主动找你。
时间久了，她冰冷的外壳慢慢融化，向你敞开心扉，说出藏在心底的告白。
==================================================
           加比镜岚 · TRUE END 镜心之光
==================================================
"""


[[actions]]
goto = "thank"
