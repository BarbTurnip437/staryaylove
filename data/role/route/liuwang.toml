# 小鸟游刘网 个人线
text = """

==================================================
                 小鸟游刘网 个人线
==================================================
按回车开始……
"""

[[actions]]
text = """
如风一般的少女，自由、热烈、奔向你。

【选择题：你要和她一起奔跑吗？】
1. 当然！
2. 慢慢走也可以
> """
