==================================================
           小鸟游刘网 · TRUE END 风之誓约
==================================================
"""


[[actions]]
requirement = { capture = true }
text = """
你选择慢慢走，她调皮地笑了，说："那我就陪你慢慢走吧！"
虽然步伐放缓，但她依然紧紧牵着你的手。
你们漫步在黄昏的街道上，享受着这份宁静的时光。
最终，你们还是奔向了属于彼此的未来。
==================================================
           小鸟游刘网 · TRUE END 风之誓约
==================================================
